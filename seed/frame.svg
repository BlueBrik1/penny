<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600" font-family="Inter, system-ui, sans-serif">
  <rect width="900" height="600" fill="#f7f8fa"/>

  <!-- .section (sidebar) -->
  <rect x="680" y="40" width="180" height="420" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="700" y="72" font-size="13" font-weight="700" fill="#1a1a2e">Sidebar</text>
  <rect x="700" y="90" width="140" height="10" rx="5" fill="#eef0f3"/>
  <rect x="700" y="112" width="120" height="10" rx="5" fill="#eef0f3"/>
  <rect x="700" y="134" width="140" height="10" rx="5" fill="#eef0f3"/>

  <!-- h1 -->
  <text x="40" y="74" font-size="32" font-weight="700" fill="#1a1a2e">Ship faster.</text>
  <!-- .lead -->
  <text x="40" y="120" font-size="17" fill="#5b6472">The design system that keeps you consistent.</text>

  <!-- .btn-primary (correct brand orange #ff6b35) -->
  <rect x="40" y="150" width="170" height="56" rx="8" fill="#ff6b35"/>
  <text x="125" y="184" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Get started</text>

  <!-- .badge (near-dup orange #ff6a34) -->
  <rect x="230" y="158" width="70" height="34" rx="17" fill="#ff6a34"/>
  <text x="265" y="180" font-size="12" font-weight="600" fill="#ffffff" text-anchor="middle">New</text>

  <!-- .hero-cta (near-dup orange #f9683a) -->
  <rect x="40" y="230" width="280" height="72" rx="10" fill="#f9683a"/>
  <text x="180" y="272" font-size="17" font-weight="700" fill="#ffffff" text-anchor="middle">Start free trial</text>

  <!-- .subscribe-btn (off-palette blue #3b82f6) -->
  <rect x="340" y="230" width="180" height="56" rx="8" fill="#3b82f6"/>
  <text x="430" y="264" font-size="15" font-weight="600" fill="#ffffff" text-anchor="middle">Subscribe</text>

  <!-- .card -->
  <rect x="40" y="330" width="280" height="120" rx="10" fill="#ffffff" stroke="#e4e7ec"/>
  <text x="60" y="362" font-size="14" font-weight="700" fill="#1a1a2e">Feature</text>
  <rect x="60" y="378" width="200" height="9" rx="4" fill="#eef0f3"/>
  <rect x="60" y="398" width="160" height="9" rx="4" fill="#eef0f3"/>

  <!-- .banner (off-scale 13px margin) -->
  <rect x="340" y="310" width="300" height="64" rx="8" fill="#fff7f2" stroke="#ffd9c4"/>
  <text x="360" y="348" font-size="14" fill="#8a5a3a">Limited-time offer inside</text>

  <!-- .grid -->
  <rect x="40" y="470" width="185" height="90" rx="8" fill="#ffffff" stroke="#e4e7ec"/>
  <rect x="247" y="470" width="185" height="90" rx="8" fill="#ffffff" stroke="#e4e7ec"/>
  <rect x="455" y="470" width="185" height="90" rx="8" fill="#ffffff" stroke="#e4e7ec"/>

  <!-- .success-note -->
  <text x="680" y="500" font-size="13" font-weight="600" fill="#2ecc71">✓ All systems go</text>
</svg>
